<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HappyDog</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<h1>HappyDog</h1>

<p>
강아지를 위한 건강한 라이프스타일
</p>

<button id="ctaBtn">
무료 체험 신청
</button>

</header>

<section class="feature">

<h2>왜 HappyDog일까요?</h2>

<div class="cards">

<div class="card">
🐶
<h3>천연 원료</h3>
<p>안전한 원료만 사용합니다.</p>
</div>

<div class="card">
💧
<h3>높은 기호성</h3>
<p>물을 더 맛있게 마셔요.</p>
</div>

<div class="card">
❤️
<h3>수의사 추천</h3>
<p>전문가와 함께 개발했습니다.</p>
</div>

</div>

</section>

<section class="newsletter">

<h2>무료 체험 신청</h2>

<input
type="email"
placeholder="이메일을 입력하세요">

<button id="submitBtn">

신청하기

</button>

</section>

<script src="script.js"></script>

</body>
</html>
